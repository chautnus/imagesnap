<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ImageSnap | Ecommerce Image & Data Collector</title>
    <meta name="description" content="Collect product images and metadata from any ecommerce site directly to Google Sheets. The ultimate tool for dropshippers and online sellers." />
    <meta name="keywords" content="dropshipping, product research, google sheets, ecommerce tool, image scraper, shopify collector" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ImageSnap | Ecommerce Image & Data Collector" />
    <meta property="og:description" content="Snap product images and details directly to Google Sheets from any website." />
    <meta property="og:image" content="https://picsum.photos/seed/productsnap_og/1200/630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="ImageSnap | Ecommerce Image & Data Collector" />
    <meta property="twitter:description" content="Collect product images and metadata from any ecommerce site directly to Google Sheets." />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.imagesnap.cloud/" />

    <!-- Schema: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ImageSnap",
      "url": "https://www.imagesnap.cloud",
      "logo": "https://www.imagesnap.cloud/icon512.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@imagesnap.cloud",
        "contactType": "customer support"
      },
      "sameAs": []
    }
    </script>

    <!-- Schema: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ImageSnap: Ecommerce Asset Collector",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Chrome, Edge, Web",
      "url": "https://www.imagesnap.cloud",
      "description": "Collect product images and metadata from any ecommerce site directly to Google Sheets and Drive.",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Free Tier — 30 snaps/month"
        },
        {
          "@type": "Offer",
          "price": "29",
          "priceCurrency": "USD",
          "name": "PRO Lifetime — Unlimited snaps"
        }
      ],
      "publisher": {
        "@type": "Organization",
        "name": "ImageSnap"
      }
    }
    </script>

    <!-- PWA (Manifest injected by VitePWA) -->
    <meta name="theme-color" content="#D4FF00" />
    <link rel="apple-touch-icon" href="/icon192.png" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
